# ============================================================
# Default datasource — life domain + casehub-work tables
# drop-and-create: Hibernate creates all tables from entity definitions.
# Flyway disabled: casehub-work V1 and casehub-engine-persistence-hibernate
# V1.0.0 both live at classpath:db/migration — Flyway rejects the conflict.
# GE-20260420-d99177: UUID-suffix isolates test class data.
# ============================================================
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:life_${surefire.forkNumber:0};MODE=PostgreSQL;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.hibernate-orm.packages=io.casehub.work.runtime.model,io.casehub.work.runtime.filter,io.casehub.life.app.entity
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.flyway.migrate-at-start=false

# ============================================================
# Qhorus named datasource — qhorus + casehub-ledger tables
# drop-and-create: Hibernate creates qhorus+ledger tables from entity definitions.
# ============================================================
quarkus.datasource.qhorus.db-kind=h2
quarkus.datasource.qhorus.jdbc.url=jdbc:h2:mem:qhorus_${surefire.forkNumber:0};MODE=PostgreSQL;DB_CLOSE_DELAY=-1
quarkus.datasource.qhorus.username=sa
quarkus.datasource.qhorus.password=
quarkus.hibernate-orm."qhorus".datasource=qhorus
quarkus.hibernate-orm."qhorus".packages=io.casehub.qhorus.runtime,io.casehub.ledger.runtime.model,io.casehub.ledger.model
quarkus.hibernate-orm."qhorus".database.generation=drop-and-create
quarkus.flyway."qhorus".migrate-at-start=false

casehub.ledger.datasource=qhorus

# ============================================================
# Reactive suppression — JDBC-only test environment (PP-20260524-075e06)
# ============================================================
quarkus.datasource.reactive=false
quarkus.datasource.qhorus.reactive=false

# ============================================================
# CDI — resolve conflicts between engine and casehub-work workload providers
# ============================================================
quarkus.arc.exclude-types=\
  io.casehub.connectors.twilio.TwilioSmsConnector,\
  io.casehub.connectors.whatsapp.WhatsAppConnector,\
  io.casehub.work.runtime.service.JpaWorkloadProvider,\
  io.casehub.work.runtime.service.ExpiryLifecycleService,\
  io.casehub.work.runtime.service.ExpiryCleanupJob,\
  io.casehub.work.runtime.service.ClaimDeadlineJob,\
  io.casehub.work.runtime.strategy.RoutingCursorCleanupJob

quarkus.arc.selected-alternatives=\
  io.casehub.ledger.runtime.repository.jpa.JpaLedgerEntryRepository,\
  io.casehub.persistence.memory.MemoryPlanItemStore,\
  io.casehub.persistence.memory.MemorySubCaseGroupRepository

# ============================================================
# Engine jar indexing — no Jandex index in engine jars
# ============================================================
quarkus.index-dependency.engine-runtime.group-id=io.casehub
quarkus.index-dependency.engine-runtime.artifact-id=casehub-engine
quarkus.index-dependency.engine-testing.group-id=io.casehub
quarkus.index-dependency.engine-testing.artifact-id=casehub-engine-testing
quarkus.index-dependency.engine-work-adapter.group-id=io.casehub
quarkus.index-dependency.engine-work-adapter.artifact-id=casehub-engine-work-adapter
quarkus.index-dependency.engine-persistence-memory.group-id=io.casehub
quarkus.index-dependency.engine-persistence-memory.artifact-id=casehub-engine-persistence-memory
quarkus.index-dependency.engine-common.group-id=io.casehub
quarkus.index-dependency.engine-common.artifact-id=casehub-engine-common

# ============================================================
# Quartz RAM store — no JDBC scheduler tables in tests
# ============================================================
quarkus.quartz.store-type=ram
quarkus.scheduler.start-mode=forced

quarkus.http.test-port=0
