quarkus.application.name=casehub-life

# ============================================================
# Default datasource — life domain + casehub-work tables
# Flyway: casehub-work migrations (V1-V31) + life domain migrations (V100+).
# Life migrations at classpath:db/life/migration; work at classpath:db/work/migration.
# V-ranges do not overlap; Flyway sorts across all locations by version number.
# ============================================================
quarkus.datasource.db-kind=postgresql
quarkus.hibernate-orm.packages=io.casehub.work.runtime.model,io.casehub.work.runtime.filter,io.casehub.life.app.entity,io.casehub.work.engine
quarkus.hibernate-orm.schema-management.strategy=none
# Life domain migrations (V100+). Flyway sorts all locations by version number:
# casehub-work occupies V1-V31; life starts at V100. work_item_template (V5)
# is created before life seeds (V102) because 5 < 102 — not because of path order.
quarkus.flyway.locations=classpath:db/life/migration,classpath:db/work/migration
quarkus.flyway.migrate-at-start=true

%dev.quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.jdbc.url=jdbc:h2:mem:life;MODE=PostgreSQL;DB_CLOSE_DELAY=-1

# ============================================================
# Qhorus named datasource — qhorus + casehub-ledger tables
# Platform convention: ledger always shares the qhorus PU.
# ============================================================
quarkus.datasource.qhorus.db-kind=postgresql
quarkus.hibernate-orm."qhorus".datasource=qhorus
quarkus.hibernate-orm."qhorus".packages=io.casehub.qhorus.runtime,io.casehub.ledger.runtime,io.casehub.ledger.model,io.casehub.life.app.ledger
quarkus.hibernate-orm."qhorus".schema-management.strategy=none
quarkus.flyway."qhorus".locations=classpath:db/qhorus/migration,classpath:db/ledger/migration,classpath:db/life/ledger/migration,classpath:db/engine-ledger/migration
quarkus.flyway."qhorus".migrate-at-start=true

%dev.quarkus.datasource.qhorus.db-kind=h2
%dev.quarkus.datasource.qhorus.jdbc.url=jdbc:h2:mem:qhorus;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
%dev.quarkus.datasource.qhorus.username=sa
%dev.quarkus.datasource.qhorus.password=

# Route casehub-ledger CDI producer to the qhorus PU
casehub.ledger.datasource=qhorus

# ============================================================
# Sentinel heartbeat configuration (life#37)
# ============================================================
casehub.life.sentinel.capabilities.contractor-sentinel.agent=HOME
casehub.life.sentinel.capabilities.contractor-sentinel.heartbeat-interval=PT4H
casehub.life.sentinel.capabilities.maintenance-sentinel.agent=HOME
casehub.life.sentinel.capabilities.maintenance-sentinel.heartbeat-interval=PT4H
casehub.life.sentinel.capabilities.follow-up-sentinel.agent=HEALTH
casehub.life.sentinel.capabilities.follow-up-sentinel.heartbeat-interval=PT12H
casehub.life.sentinel.capabilities.care-quality-sentinel.agent=HEALTH
casehub.life.sentinel.capabilities.care-quality-sentinel.heartbeat-interval=PT12H
casehub.life.sentinel.capabilities.patient-status-sentinel.agent=HEALTH
casehub.life.sentinel.capabilities.patient-status-sentinel.heartbeat-interval=PT24H
casehub.life.sentinel.capabilities.anomaly-sentinel.agent=FINANCE
casehub.life.sentinel.capabilities.anomaly-sentinel.heartbeat-interval=PT24H
casehub.life.sentinel.capabilities.booking-sentinel.agent=TRAVEL
casehub.life.sentinel.capabilities.booking-sentinel.heartbeat-interval=PT6H
quarkus.quartz.thread-pool-size=15

# Channel context enrichment for heartbeat sentinels (life#61)
casehub.life.channel-context.message-limit=10

# ============================================================
# XA — required when a single transaction writes to both datasources
# ============================================================
quarkus.datasource.jdbc.transactions=xa
quarkus.datasource.qhorus.jdbc.transactions=xa

# ============================================================
# Reactive suppression — JDBC-only; reactive datasource not configured.
# Without this, qhorus reactive service beans fail CDI validation.
# Protocol: PP-20260524-075e06
# ============================================================
quarkus.datasource.reactive=false
quarkus.datasource.qhorus.reactive=false

# ============================================================
# CDI alternatives — select JPA implementations
# JpaLedgerEntryRepository is @Alternative; must be explicitly selected.
# ============================================================
quarkus.arc.selected-alternatives=\
  io.casehub.ledger.runtime.repository.jpa.JpaLedgerEntryRepository,\
  io.casehub.ledger.runtime.repository.jpa.JpaActorTrustScoreRepository,\
  io.casehub.persistence.memory.InMemoryCaseInstanceRepository,\
  io.casehub.persistence.memory.InMemoryCaseMetaModelRepository,\
  io.casehub.persistence.memory.InMemoryEventLogRepository,\
  io.casehub.persistence.memory.MemorySubCaseGroupRepository,\
  io.casehub.persistence.memory.MemoryPlanItemStore,\
  io.casehub.persistence.memory.MemoryReactivePlanItemStore,\
  io.casehub.life.app.cbr.LifePlanAdapter,\
  io.casehub.life.app.spi.JuniorLifeCaseVisibilityPolicy

# ============================================================
# CDI exclusions
# CurrentPrincipal resolution: OidcCurrentPrincipal @Alternative @Priority(100) wins in production
#   via platform#112 — no exclude-types needed.
# MockGroupMembershipProvider: test-only stub from casehub-platform-mock; excluded from production.
# OpenClaw heartbeat-mode beans: excluded because casehub-life uses direct-call mode (life#25).
# ============================================================
quarkus.arc.exclude-types=\
  io.casehub.platform.mock.MockGroupMembershipProvider,\
  io.casehub.openclaw.casehub.OpenClawCaseChannelProvider,\
  io.casehub.openclaw.casehub.ReactiveOpenClawCaseChannelProvider,\
  io.casehub.openclaw.casehub.OpenClawWorkerProvisioner,\
  io.casehub.openclaw.casehub.ReactiveOpenClawWorkerProvisioner,\
  io.casehub.openclaw.casehub.OpenClawChannelBackend,\
  io.casehub.openclaw.casehub.ChannelContextWindowObserver,\
  io.casehub.openclaw.casehub.OpenClawAgentRegistry,\
  io.casehub.openclaw.casehub.OpenClawCasehubConfig,\
  io.casehub.openclaw.casehub.OpenClawWorkerStatusListener,\
  io.casehub.openclaw.casehub.OversightGateDispatcher,\
  io.casehub.openclaw.casehub.OversightGateService

# ============================================================
# SLA breach policy — activate life-specific escalation (LifeSlaBreachPolicy).
# Default is "no-op" which silently disables all SLA escalation.
# ============================================================
casehub.work.sla.breach-policy=life-sla-breach

# ============================================================
# Scheduler — force start so casehub-work SLA jobs (ExpiryCleanupJob,
# ClaimDeadlineJob) run in production without a full deployment trigger.
# ============================================================
quarkus.scheduler.start-mode=forced

# ============================================================
# Trust scoring — enable Bayesian Beta computation from attestations
# ============================================================
casehub.ledger.trust-score.enabled=true

# ============================================================
# Preference config files — trust routing YAML
# ============================================================
casehub.platform.config.files=classpath:casehub/life/trust-routing.yaml,classpath:casehub/life/risk-policy.yaml

# ============================================================
# OpenClaw configuration (casehub-openclaw-core/casehub)
# OpenClawClientConfig (@ConfigMapping prefix = "casehub.openclaw")
# casehub.openclaw.gateway.url — OpenClaw gateway base URL (required, no default)
# casehub.openclaw.gateway.bearer-token — API key for /hooks/agent auth (required)
# casehub.openclaw.delivery.base-url — webhook callback URL reachable from OpenClaw (required)
# casehub.openclaw.agent.default-timeout-seconds — default 120
#
# casehub.life.tenancy-id — Household tenancy UUID (required, no default)
#
# These properties are REQUIRED (no defaults) and must NOT appear here with empty values
# (Quarkus injects "" for a present-but-empty key, bypassing ConfigException at startup).
# Set in deployment environment: env vars, Kubernetes Secrets, or docker-compose .env.
# ============================================================
quarkus.rest-client.openclaw-gateway.url=${casehub.openclaw.gateway.url}

# ============================================================
# OIDC — casehub-platform-oidc (life#40)
# Required deployment env vars (do NOT set values here — empty strings bypass ConfigException):
#   QUARKUS_OIDC_AUTH_SERVER_URL — e.g. https://auth.example.com/realms/casehub
#   QUARKUS_OIDC_CLIENT_ID       — e.g. casehub-life
# ============================================================
quarkus.oidc.application-type=service

# Dev profile — disable OIDC and all security enforcement.
# quarkus.security.auth.enabled-in-dev-mode=false activates DevModeDisabledAuthorizationController
# (quarkus-security-runtime-spi 3.32.2): isAuthorizationEnabled()=false, bypassing both
# EagerSecurityHandler and the CDI security interceptor — @RolesAllowed not enforced in dev.
# quarkus.oidc.enabled=false prevents OIDC from attempting token validation or discovery.
%dev.quarkus.security.auth.enabled-in-dev-mode=false
%dev.quarkus.oidc.enabled=false
%dev.quarkus.keycloak.devservices.enabled=false

# ============================================================
# Demo profile — pre-populated data for standalone Household Hub.
# Flyway seeds at db/life/demo/ (V9000+ range) run only in demo profile.
# Inherits dev profile security settings (OIDC disabled, no auth).
# ============================================================
%demo.quarkus.datasource.db-kind=h2
%demo.quarkus.datasource.jdbc.url=jdbc:h2:mem:life;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
%demo.quarkus.datasource.qhorus.db-kind=h2
%demo.quarkus.datasource.qhorus.jdbc.url=jdbc:h2:mem:qhorus;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
%demo.quarkus.datasource.qhorus.username=sa
%demo.quarkus.datasource.qhorus.password=
%demo.quarkus.flyway.locations=classpath:db/life/migration,classpath:db/work/migration,classpath:db/life/demo
%demo.quarkus.flyway.migrate-at-start=true
%demo.quarkus.security.auth.enabled-in-dev-mode=false
%demo.quarkus.oidc.enabled=false
%demo.quarkus.keycloak.devservices.enabled=false

# ============================================================
# Quinoa — serves life-ui SPA from Quarkus.
# In dev/demo mode, Quinoa starts the Vite dev server and proxies
# frontend requests. In production, serves pre-built static assets.
# Disabled by default; active only in demo and dev profiles.
# ============================================================
quarkus.quinoa.enabled=false
%dev.quarkus.quinoa.enabled=true
%dev.quarkus.quinoa.ui-dir=../life-ui
%dev.quarkus.quinoa.enable-spa-routing=true
%dev.quarkus.quinoa.package-manager-install=false
%demo.quarkus.quinoa.enabled=true
%demo.quarkus.quinoa.ui-dir=../life-ui
%demo.quarkus.quinoa.enable-spa-routing=true
%demo.quarkus.quinoa.package-manager-install=false
