quarkus.application.name=casehub-life

# ============================================================
# Default datasource — life domain + casehub-work tables
# Flyway: casehub-work migrations (V1-V31) + life domain migrations (V100+)
# both live at classpath:db/migration; V-ranges do not overlap.
# ============================================================
quarkus.datasource.db-kind=postgresql
quarkus.hibernate-orm.packages=io.casehub.work.runtime.model,io.casehub.work.runtime.filter,io.casehub.life.app.entity
quarkus.hibernate-orm.schema-management.strategy=none
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.migrate-at-start=true

%dev.quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.jdbc.url=jdbc:h2:mem:life;MODE=PostgreSQL;DB_CLOSE_DELAY=-1

# ============================================================
# Qhorus named datasource — qhorus + casehub-ledger tables
# Platform convention: ledger always shares the qhorus PU.
# ============================================================
quarkus.datasource.qhorus.db-kind=postgresql
quarkus.hibernate-orm."qhorus".datasource=qhorus
quarkus.hibernate-orm."qhorus".packages=io.casehub.qhorus.runtime,io.casehub.ledger.runtime.model,io.casehub.ledger.model
quarkus.hibernate-orm."qhorus".schema-management.strategy=none
quarkus.flyway."qhorus".locations=classpath:db/qhorus/migration,classpath:db/ledger/migration
quarkus.flyway."qhorus".migrate-at-start=true

%dev.quarkus.datasource.qhorus.db-kind=h2
%dev.quarkus.datasource.qhorus.jdbc.url=jdbc:h2:mem:qhorus;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
%dev.quarkus.datasource.qhorus.username=sa
%dev.quarkus.datasource.qhorus.password=

# Route casehub-ledger CDI producer to the qhorus PU
casehub.ledger.datasource=qhorus

# ============================================================
# XA — required when a single transaction writes to both datasources
# ============================================================
quarkus.datasource.jdbc.transactions=xa
quarkus.datasource.qhorus.jdbc.transactions=xa

# ============================================================
# Reactive suppression — JDBC-only; reactive datasource not configured.
# Without this, qhorus reactive service beans fail CDI validation.
# Protocol: PP-20260524-075e06
# ============================================================
quarkus.datasource.reactive=false
quarkus.datasource.qhorus.reactive=false

# ============================================================
# CDI alternatives — select JPA implementations
# JpaLedgerEntryRepository is @Alternative; must be explicitly selected.
# Engine memory stores used in production showcase (no JPA engine store configured).
# ============================================================
quarkus.arc.selected-alternatives=\
  io.casehub.ledger.runtime.repository.jpa.JpaLedgerEntryRepository,\
  io.casehub.persistence.memory.MemoryPlanItemStore,\
  io.casehub.persistence.memory.MemorySubCaseGroupRepository

# ============================================================
# Engine CDI — exclude conflicting workload provider in production
# CasehubWorkloadProvider (engine-internal) conflicts with JpaWorkloadProvider (casehub-work).
# ============================================================
%prod.quarkus.arc.exclude-types=io.casehub.engine.internal.worker.CasehubWorkloadProvider

# ============================================================
# Jar indexing — casehub-engine jars lack Jandex indices; force CDI discovery
# ============================================================
%prod.quarkus.index-dependency.casehub-engine.group-id=io.casehub
%prod.quarkus.index-dependency.casehub-engine.artifact-id=casehub-engine
%prod.quarkus.index-dependency.casehub-engine-common.group-id=io.casehub
%prod.quarkus.index-dependency.casehub-engine-common.artifact-id=casehub-engine-common
%prod.quarkus.index-dependency.casehub-engine-persistence-hibernate.group-id=io.casehub
%prod.quarkus.index-dependency.casehub-engine-persistence-hibernate.artifact-id=casehub-engine-persistence-hibernate

# ============================================================
# Quartz — RAM store (no JDBC scheduler tables)
# ============================================================
quarkus.quartz.store-type=ram
quarkus.scheduler.start-mode=forced
